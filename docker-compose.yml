services:
  mysql:
    image: mysql:8.4
    container_name: ims_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ims_project
      MYSQL_USER: ims_user
      MYSQL_PASSWORD: ims_secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ims_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ims_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ims_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ims_mysql_data:
  ims_redis_data:
